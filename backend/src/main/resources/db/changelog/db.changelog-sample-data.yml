databaseChangeLog:
  # 1. Create a single owner/user
  - changeSet:
      id: 2026-03-22 Add user
      author: Gemini
      changes:
        - insert:
            tableName: user
            columns:
              - column: { name: id, value: "f04b862d-eb29-4fd6-8ada-b882e71b2b26" }
              - column: { name: email, value: "user@mail.com" }
              - column: { name: password, value: "always_hash_your_passwords_lol" }

  # 2. Create 20 unique attributes
  - changeSet:
      id: 2026-03-22 Add attributes
      author: Gemini
      changes:
        - loadData:
            tableName: attribute
            file: db/changelog/sample-attributes.csv
            columns:
              - column:
                  header: id
                  name: id
                  type: uuid
              - column:
                  header: name
                  name: name
                  type: string

  # 3. Create Multiple Restaurants
