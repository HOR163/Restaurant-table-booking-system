              - column: { name: name, value: "The Golden Fork" }
              - column: { name: owner, value: "f04b862d-eb29-4fd6-8ada-b882e71b2b26" }
        - insert:
            tableName: restaurant
            columns:
              - column: { name: id, value: "00000000-0000-4000-8000-000000000002" }
